name: Configure Wealth Agent

on:
    workflow_dispatch:

jobs:
    configure-foundry-agents:
        runs-on: ubuntu-latest
        outputs:
            agent-versions: ${{ steps.create-agent.outputs.AGENT_VERSIONS }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - name: Install the latest version of uv
              uses: astral-sh/setup-uv@v7

            - name: Install dependencies
              run: |
                  uv sync
              working-directory: agents

            - name: Azure Login
              uses: Azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: Run agents creation script
              id: create-agent
              env:
                  # Add your environment variables here
                  PROJECT_ENDPOINT: ${{ secrets.PROJECT_ENDPOINT }}
                  AGENT_MODEL: ${{ secrets.CHAT_COMPLETION_MODEL }}
              run: |
                  uv run main.py
              working-directory: agents

            - name: Save agent version as secret
              env:
                  GH_TOKEN: ${{ secrets.PA_TOKEN }}
              run: |
                  gh secret set AGENT_VERSIONS --body "${{ steps.create-agent.outputs.AGENT_VERSIONS }}"

    run-agent-evaluations:
        needs: configure-foundry-agents
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Azure Login
              uses: Azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: Run Evaluation
              uses: microsoft/ai-agent-evals@v3-beta
              with:
                  azure-ai-project-endpoint: ${{secrets.PROJECT_ENDPOINT}}
                  deployment-name: ${{secrets.CHAT_COMPLETION_MODEL}}
                  agent-ids: ${{ needs.configure-foundry-agents.outputs.agent-versions }}
                  data-path: ${{ github.workspace }}/evaluation//dataset//cicd.json
